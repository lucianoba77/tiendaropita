<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Prenda</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<div class="navbar">
    <a class="brand" th:href="@{/}">Tienda Ropita</a>
    <nav>
        <a th:href="@{/tienda/prendas/list}">Prendas</a>
        <a th:href="@{/tienda/clientes/list}">Clientes</a>
        <a th:href="@{/tienda/ventas/list}">Ventas</a>
    </nav>
</div>

<div class="container">
    <div class="card">
        <h1>Editar Prenda</h1>
        <form th:action="@{'/tienda/prendas/update/' + ${prenda.id}}" th:object="${prenda}" method="post">
            <div class="form-group">
                <label>ID
                    <input type="text" th:field="*{id}" readonly />
                </label>
            </div>
            <div class="form-group">
                <label>Descripcion
                    <input type="text" th:field="*{descripcion}" required />
                </label>
            </div>
            <div class="form-group">
                <label>Precio Base
                    <input type="number" step="0.01" min="0" th:field="*{precioBase}" required />
                </label>
            </div>
            <div class="form-group">
                <label>Tipo de Prenda
                    <select th:field="*{tipoPrenda}">
                        <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo}"></option>
                    </select>
                </label>
            </div>
            <div class="form-group">
                <label>Estado
                    <select th:field="*{estadoPrenda}">
                        <option th:each="estado : ${estados}" th:value="${estado}" th:text="${estado}"></option>
                    </select>
                </label>
            </div>
            <div class="form-group">
                <label>Valor Promocion (solo para estado PROMOCION)
                    <input type="number" step="0.01" min="0" th:field="*{valorPromocion}" />
                </label>
            </div>
            <div class="form-group">
                <label>Stock disponible
                    <input type="number" step="1" min="0" name="stock" th:value="${stockActual}" />
                </label>
            </div>
            <div class="form-group">
                <label>Stock minimo (alerta)
                    <input type="number" step="1" min="0" th:field="*{stockMinimo}" />
                </label>
            </div>
            <div class="actions">
                <button type="submit" class="btn btn-success">Actualizar</button>
                <a class="btn btn-light" th:href="@{/tienda/prendas/list}">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
