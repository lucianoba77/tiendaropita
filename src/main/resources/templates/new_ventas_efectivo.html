<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nueva Venta Efectivo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<div class="navbar">
    <a class="brand" th:href="@{/}">Tienda Ropita</a>
    <nav>
        <a th:href="@{/tienda/prendas/list}">Prendas</a>
        <a th:href="@{/tienda/clientes/list}">Clientes</a>
        <a th:href="@{/tienda/ventas/list}">Ventas</a>
    </nav>
</div>

<div class="container">
    <div class="card">
        <h1>Nueva Venta en Efectivo</h1>
        <p>Selecciona el cliente. Luego podras agregar los items a la venta.</p>
        <form th:action="@{/tienda/ventas/save/efectivo}" method="post">
            <div class="form-group">
                <label for="clienteId">Cliente</label>
                <select id="clienteId" name="clienteId" required>
                    <option th:each="cliente : ${clientes}" th:value="${cliente.id}"
                            th:text="${cliente.razonSocial}"></option>
                </select>
            </div>
            <div class="actions">
                <button type="submit" class="btn btn-success">Crear Venta</button>
                <a class="btn btn-light" th:href="@{/tienda/ventas/list}">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
