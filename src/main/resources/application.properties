spring.application.name=dv-ds-20261c-g1
server.port=8090

# Credenciales locales opcionales (no versionadas). Ver application-local.properties.example
spring.config.import=optional:classpath:application-local.properties

# ===== Base de datos MySQL (desarrollo) =====
# Requiere un servidor MySQL corriendo. La opcion createDatabaseIfNotExist crea la BD automaticamente.
spring.datasource.url=jdbc:mysql://localhost:3306/dv_ds_20261c_g1?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# ddl-auto=update: Hibernate crea/actualiza las tablas a partir de las entidades.
# Si preferis administrar el esquema manualmente con los scripts de src/main/resources/sql,
# cambia este valor a 'none' y ejecuta 01-tablas.sql y 02-data.sql en tu MySQL.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.aop.proxy-target-class=true

# ===== Datos de ejemplo =====
# Carga data.sql luego de que Hibernate cree las tablas (solo inserta si la tabla esta vacia segun el script).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/data-seed.sql

# ===== Actuator =====
management.endpoints.web.exposure.include=*

# ===== Jackson =====
spring.jackson.serialization.fail-on-empty-beans=false
